<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Voice Assistant 🎙️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      position: relative;
    }

    .avatar.speaking::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .header-info h1 {
      font-size: 1.25rem;
      color: #1f2937;
    }

    .header-info p {
      font-size: 0.875rem;
      color: #6b7280;
    }

    .stop-btn {
      margin-left: auto;
      padding: 0.5rem 1rem;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .stop-btn:hover:not(:disabled) {
      background: #dc2626;
    }

    .stop-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-container {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 2rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      overflow-y: auto;
      min-height: 400px;
      max-height: 60vh;
    }

    .message {
      margin-bottom: 1rem;
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.qwen {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.5;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .message.qwen .message-bubble {
      background: #f3f4f6;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }

    .message-time {
      font-size: 0.75rem;
      margin-top: 0.25rem;
      opacity: 0.7;
    }

    .listening-indicator {
      text-align: center;
      padding: 0.5rem 1rem;
      background: #fef3c7;
      color: #92400e;
      border-radius: 2rem;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    .input-area {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      margin-top: 1rem;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
    }

    .input-group input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #667eea;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-send {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-send:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-mic {
      background: #f3f4f6;
      color: #374151;
      font-size: 1.5rem;
      padding: 0.5rem 1rem;
    }

    .btn-mic:hover {
      background: #e5e7eb;
    }

    .btn-mic.listening {
      background: #ef4444;
      color: white;
      animation: pulse 1s infinite;
    }

    .tip {
      text-align: center;
      margin-top: 1rem;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.875rem;
    }

    .not-supported {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .not-supported h2 {
      margin-bottom: 1rem;
      color: #1f2937;
    }

    .not-supported p {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Respon otomatis dari Qwen
    const qwenResponses = {
      'halo': 'Halo! 👋 Senang bertemu denganmu! Ada yang bisa saya bantu hari ini?',
      'hai': 'Hai! 😊 Apa kabar? Saya siap membantu kamu!',
      'apa kabar': 'Saya baik-baik saja, terima kasih sudah bertanya! 😄 Bagaimana dengan kamu?',
      'siapa kamu': 'Saya adalah asisten virtual yang dibuat untuk menemani ngobrol kamu! 🤖✨',
      'siapa namamu': 'Nama saya Qwen Assistant! 😊 Saya di sini untuk membantu kamu!',
      'terima kasih': 'Sama-sama! 😊 Senang bisa membantu!',
      'makasih': 'Sama-sama! Jangan ragu untuk tanya apa saja ya! 🙌',
      'default': 'Menarik! 🤔 Ceritakan lebih lanjut, saya di sini untuk mendengar dan membantu kamu! 😊',
    };

    function getQwenResponse(userMessage) {
      const lowerMessage = userMessage.toLowerCase();
      
      for (const [key, response] of Object.entries(qwenResponses)) {
        if (key !== 'default' && lowerMessage.includes(key)) {
          return response;
        }
      }
      
      return qwenResponses['default'];
    }

    let messages = [];
    let isListening = false;
    let isSpeaking = false;
    let recognition = null;

    // Cek browser support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const isSupported = SpeechRecognition && 'speechSynthesis' in window;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'id-ID';
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        handleSendMessage(transcript);
        setIsListening(false);
      };

      recognition.onerror = () => {
        setIsListening(false);
      };

      recognition.onend = () => {
        setIsListening(false);
      };
    }

    function setIsListening(value) {
      isListening = value;
      render();
    }

    function setIsSpeaking(value) {
      isSpeaking = value;
      render();
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;

        const voices = window.speechSynthesis.getVoices();
        const idVoice = voices.find(v => v.lang.startsWith('id') || v.lang.startsWith('ms'));
        if (idVoice) {
          utterance.voice = idVoice;
        }

        utterance.onstart = () => setIsSpeaking(true);
        utterance.onend = () => setIsSpeaking(false);
        utterance.onerror = () => setIsSpeaking(false);

        window.speechSynthesis.speak(utterance);
      }
    }

    function startListening() {
      if (recognition && !isListening) {
        try {
          recognition.start();
          setIsListening(true);
        } catch (error) {
          console.error('Error starting recognition:', error);
          setIsListening(false);
        }
      }
    }

    function stopListening() {
      if (recognition && isListening) {
        recognition.stop();
        setIsListening(false);
      }
    }

    function handleSendMessage(text) {
      const messageText = text || document.getElementById('messageInput').value.trim();
      if (!messageText) return;

      const userMsg = {
        id: Date.now().toString(),
        text: messageText,
        sender: 'user',
        timestamp: new Date(),
      };

      messages.push(userMsg);
      document.getElementById('messageInput').value = '';
      render();
      scrollToBottom();

      setTimeout(() => {
        const responseText = getQwenResponse(messageText);
        const qwenMsg = {
          id: (Date.now() + 1).toString(),
          text: responseText,
          sender: 'qwen',
          timestamp: new Date(),
        };
        messages.push(qwenMsg);
        render();
        scrollToBottom();
        speakText(responseText);
      }, 500);
    }

    function scrollToBottom() {
      const messagesDiv = document.getElementById('messages');
      if (messagesDiv) {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    }

    function formatTime(date) {
      return date.toLocaleTimeString('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function render() {
      const app = document.getElementById('app');
      
      if (!isSupported) {
        app.innerHTML = `
          <div class="not-supported">
            <div style="font-size: 4rem; margin-bottom: 1rem;">😔</div>
            <h2>Browser Tidak Mendukung</h2>
            <p>Maaf, browser kamu tidak mendukung Web Speech API. Coba gunakan Chrome atau Edge untuk pengalaman terbaik.</p>
          </div>
        `;
        return;
      }

      const messagesHTML = messages.map(msg => `
        <div class="message ${msg.sender}">
          <div class="message-bubble">
            <div>${msg.text}</div>
            <div class="message-time">${formatTime(msg.timestamp)}</div>
          </div>
        </div>
      `).join('');

      const listeningHTML = isListening ? `
        <div style="text-align: center; margin-top: 1rem;">
          <div class="listening-indicator">🎤 Mendengarkan...</div>
        </div>
      ` : '';

      app.innerHTML = `
        <div class="header">
          <div class="avatar ${isSpeaking ? 'speaking' : ''}">Q</div>
          <div class="header-info">
            <h1>Qwen Voice Assistant 🎙️</h1>
            <p>${isSpeaking ? '🔊 Sedang berbicara...' : '✅ Siap ngobrol'}</p>
          </div>
          <button class="stop-btn" ${!isSpeaking ? 'disabled' : ''} onclick="window.speechSynthesis.cancel()">⏹️ Stop</button>
        </div>

        <div class="chat-container">
          <div class="messages" id="messages">
            ${messagesHTML}
            ${listeningHTML}
          </div>

          <div class="input-area">
            <div class="input-group">
              <input 
                type="text" 
                id="messageInput" 
                placeholder="Ketik pesan atau klik mikrofon..." 
                onkeypress="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); handleSendMessage(); }"
              />
              <button class="btn btn-send" id="sendBtn" onclick="handleSendMessage()">Kirim</button>
              <button 
                class="btn btn-mic ${isListening ? 'listening' : ''}" 
                onclick="${isListening ? 'stopListening()' : 'startListening()'}"
                title="${isListening ? 'Stop mendengarkan' : 'Mulai mendengarkan'}"
              >
                ${isListening ? '🎙️' : '🎤'}
              </button>
            </div>
          </div>

          <div class="tip">💡 Tip: Klik 🎤 untuk berbicara menggunakan suara</div>
        </div>
      `;

      // Re-focus input if needed
      const input = document.getElementById('messageInput');
      if (input && document.activeElement !== input) {
        // Don't auto-focus to avoid interrupting speech
      }
    }

    // Initialize
    const welcomeMsg = {
      id: Date.now().toString(),
      text: 'Halo! 👋 Saya Qwen Assistant. Kamu bisa ngobrol dengan mengetik atau menggunakan tombol mikrofon di bawah. Ada yang bisa saya bantu?',
      sender: 'qwen',
      timestamp: new Date(),
    };
    messages = [welcomeMsg];

    // Load voices then render
    window.speechSynthesis.onvoiceschanged = () => {
      render();
      setTimeout(() => speakText(welcomeMsg.text), 500);
    };

    render();
    setTimeout(() => speakText(welcomeMsg.text), 500);
  </script>
</body>
</html>
